<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感想帳 — 星の社</title>
<meta name="description" content="星の社を遊んでくれたあなたの声を、絵馬にして掛けてください。">
<meta name="robots" content="noindex">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060618;
    color: #c8c8e8;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
    line-height: 2;
    letter-spacing: .08em;
    padding: 40px 22px 80px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 {
    font-size: 20px; font-weight: normal; text-align: center;
    letter-spacing: .5em; text-indent: .5em; color: #d8d8f2;
    margin-bottom: 10px;
  }
  .lead {
    font-size: 12.5px; color: #9a9ac8; text-align: center;
    letter-spacing: .15em; margin-bottom: 42px; line-height: 2.2;
  }
  .q { margin-bottom: 34px; }
  .q-title {
    font-size: 13.5px; color: #d8d8f2; letter-spacing: .2em; margin-bottom: 12px;
  }
  .q-title small { font-size: 10.5px; color: #77779f; letter-spacing: .12em; margin-left: 8px; }
  .opts { display: flex; flex-wrap: wrap; gap: 10px; }
  .opts label {
    display: block; cursor: pointer;
    font-size: 13px; letter-spacing: .12em; color: #b8b8dd;
    border: 1px solid rgba(160,160,220,.35); border-radius: 22px;
    padding: 9px 18px;
    transition: all .3s;
    user-select: none;
  }
  .opts input { display: none; }
  .opts input:checked + span { color: #ffe9a8; }
  .opts label:has(input:checked) {
    border-color: rgba(255,233,168,.7);
    box-shadow: 0 0 12px rgba(255,224,158,.25);
    color: #ffe9a8;
  }
  input[type="text"], textarea {
    width: 100%;
    background: rgba(20,20,50,.5);
    border: 1px solid rgba(160,160,220,.35);
    border-radius: 8px;
    color: #d8d8f2;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: .08em;
    padding: 12px 14px;
    line-height: 1.9;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: rgba(160,160,220,.7);
    box-shadow: 0 0 12px rgba(140,140,255,.2);
  }
  textarea { min-height: 96px; resize: vertical; }
  .hp { position: absolute; left: -9999px; opacity: 0; }
  .send {
    display: block; margin: 46px auto 0;
    background: rgba(20,20,50,.6);
    border: 1px solid rgba(160,160,220,.45);
    border-radius: 8px;
    color: #d8d8f2;
    font-family: inherit;
    font-size: 15px; letter-spacing: .3em; text-indent: .3em;
    padding: 15px 42px;
    cursor: pointer;
    line-height: 1.7;
    transition: all .3s;
  }
  .send:hover { background: rgba(40,40,90,.7); box-shadow: 0 0 16px rgba(140,140,255,.3); }
  .send:disabled { opacity: .45; cursor: default; }
  .note { font-size: 11px; color: #77779f; letter-spacing: .1em; text-align: center; margin-top: 18px; line-height: 2; }
  .warn { font-size: 12px; color: #e8b8a0; letter-spacing: .12em; text-align: center; margin-top: 16px; min-height: 24px; }
  #done { display: none; text-align: center; padding-top: 12vh; }
  #done .d-msg { font-size: 17px; letter-spacing: .35em; text-indent: .35em; color: #ffe9a8; margin-bottom: 22px; }
  #done .d-sub { font-size: 12.5px; color: #9a9ac8; letter-spacing: .15em; line-height: 2.4; margin-bottom: 40px; }
  #done a {
    color: #d8d8f2; font-size: 12.5px; letter-spacing: .18em;
    border-bottom: 1px solid rgba(150,150,200,.4); padding-bottom: 2px;
    text-decoration: none;
  }
  a.back { color: #9a9ac8; font-size: 11.5px; letter-spacing: .15em; text-decoration: none; display: block; text-align: center; margin-top: 40px; }
  a.back:hover, #done a:hover { color: #fff; }
</style>
</head>
<body>
<div class="wrap" id="form-wrap">
  <h1>感想帳</h1>
  <div class="lead">
    星の社を、遊んでくれてありがとうございます。<br>
    よかったら、あなたの声を絵馬にして掛けてください。
  </div>

  <div class="q">
    <div class="q-title">おなまえ・ペンネーム<small>なくてもかまいません</small></div>
    <input type="text" id="f-name" maxlength="40" placeholder="">
  </div>

  <div class="q">
    <div class="q-title">お使いの機種は？</div>
    <div class="opts" id="f-device">
      <label><input type="radio" name="device" value="iPhone"><span>iPhone</span></label>
      <label><input type="radio" name="device" value="Android"><span>Android</span></label>
      <label><input type="radio" name="device" value="その他・PC"><span>その他・PC</span></label>
    </div>
  </div>

  <div class="q">
    <div class="q-title">ちゃんと動きましたか？</div>
    <div class="opts" id="f-moved">
      <label><input type="radio" name="moved" value="うごいた"><span>うごいた</span></label>
      <label><input type="radio" name="moved" value="ときどき変だった"><span>ときどき変だった</span></label>
      <label><input type="radio" name="moved" value="うごかなかった"><span>うごかなかった</span></label>
    </div>
  </div>

  <div class="q">
    <div class="q-title">いちばん好きだった遊びは？</div>
    <div class="opts" id="f-favorite">
      <label><input type="radio" name="favorite" value="お参り"><span>お参り（呼吸）</span></label>
      <label><input type="radio" name="favorite" value="奉納の舞"><span>奉納の舞</span></label>
      <label><input type="radio" name="favorite" value="縁むすび"><span>縁むすび</span></label>
      <label><input type="radio" name="favorite" value="宇宙神社"><span>宇宙神社</span></label>
      <label><input type="radio" name="favorite" value="御朱印帳"><span>御朱印帳</span></label>
      <label><input type="radio" name="favorite" value="まだ途中"><span>まだ途中</span></label>
    </div>
  </div>

  <div class="q">
    <div class="q-title">わかりにくかったところ・変だったところ<small>あれば</small></div>
    <textarea id="f-trouble" maxlength="1000"></textarea>
  </div>

  <div class="q">
    <div class="q-title">ひとこと感想<small>あれば</small></div>
    <textarea id="f-comment" maxlength="1000"></textarea>
  </div>

  <div class="q">
    <div class="q-title">いただいた感想は、制作の発信で紹介してもいいですか？</div>
    <div class="opts" id="f-consent">
      <label><input type="radio" name="consent" value="ペンネーム付きで紹介OK"><span>ペンネーム付きでOK</span></label>
      <label><input type="radio" name="consent" value="名前なしでなら紹介OK"><span>名前なしでならOK</span></label>
      <label><input type="radio" name="consent" value="紹介はしないで"><span>紹介はしないで</span></label>
    </div>
  </div>

  <input type="text" id="f-hp" class="hp" tabindex="-1" autocomplete="off">

  <button class="send" id="send-btn">絵馬を、かける</button>
  <div class="warn" id="warn"></div>
  <div class="note">送っていただくのは上の内容だけです。<br>メールアドレスなどは集めていません。</div>

  <a class="back" href="./">← 星の社へもどる</a>
</div>

<div class="wrap" id="done">
  <div class="d-msg">とどきました</div>
  <div class="d-sub">
    あなたの声が、絵馬掛けにゆれています。<br>
    ありがとうございました。この社は、いただいた声で良くなっていきます。
  </div>
  <a href="./">星の社へもどる</a>
</div>

<script>
(() => {
  const API = 'https://hoshi-kansou.banb358.workers.dev/';
  const btn = document.getElementById('send-btn');
  const warn = document.getElementById('warn');
  const pick = (name) => {
    const el = document.querySelector('input[name="' + name + '"]:checked');
    return el ? el.value : '';
  };
  btn.addEventListener('click', async () => {
    const data = {
      name: document.getElementById('f-name').value.trim(),
      device: pick('device'),
      moved: pick('moved'),
      favorite: pick('favorite'),
      trouble: document.getElementById('f-trouble').value.trim(),
      comment: document.getElementById('f-comment').value.trim(),
      consent: pick('consent'),
      hp: document.getElementById('f-hp').value,
    };
    if (!data.device || !data.moved || !data.favorite || !data.consent) {
      warn.textContent = 'えらんでいない項目が、まだあるようです';
      return;
    }
    warn.textContent = '';
    btn.disabled = true;
    btn.textContent = 'かけています…';
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error('http ' + res.status);
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('done').style.display = 'block';
      window.scrollTo(0, 0);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = '絵馬を、かける';
      warn.textContent = 'うまく届きませんでした。少し待って、もう一度お試しください';
    }
  });
})();
</script>
</body>
</html>
